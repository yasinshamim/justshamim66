<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برای شمیم ❤️</title>

<link rel="stylesheet" href="style.css">

<script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.166.1/build/three.module.js"
}
}
</script>

</head>

<body>

<div id="intro">

<h1>سلام جوجه کوچولو 🐥💕</h1>

<p>
این سایتو خودم برات ساختم...
</p>

<p>
شاید خیلی حرفه‌ای نباشه،
ولی تک‌تک لحظه‌هایی که داشتم درستش می‌کردم،
به تو فکر می‌کردم. ❤️
</p>

<button id="startBtn">
بریم 🚀
</button>

</div>


<div id="passwordPage" class="hidden">

<h2>
یه رمز کوچولو وارد کن 💕
</h2>

<input
id="password"
type="password"
placeholder="مثلاً 1130"
/>

<button id="enterBtn">
ورود
</button>

<p id="error"></p>

</div>


<div id="birthday" class="hidden">

<h1>
🎂
تولدت مبارک شمیم
🎂
</h1>

<p>

امیدوارم امسال
پر از خنده
پر از آرامش
و پر از اتفاقای قشنگ برات باشه ❤️

</p>

<button id="continueBtn">

بریم بین ستاره‌ها ✨

</button>

</div>


<div id="messageBox" class="hidden">

<div id="messageText"></div>

</div>


<div id="joystick">

<div id="stick"></div>

</div>


<canvas id="bg"></canvas>

<script src="messages.js"></script>

<script type="module" src="main.js"></script>

</body>
</html>
